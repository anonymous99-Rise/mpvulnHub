name: Backfill History

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start Date (YYYY-MM-DD)'
        required: true
        default: '2024-01-01'
      end_date:
        description: 'End Date (YYYY-MM-DD)'
        required: true
        default: '2024-01-09'

jobs:
  backfill:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set executable permissions
      run: |
        chmod +x bin/wechatmp2markdown-v1.1.11_linux_amd64
        
    - name: Run backfill
      env:
         FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
         DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        echo "Starting backfill from ${{ github.event.inputs.start_date }} to ${{ github.event.inputs.end_date }}"
        python run.py --range ${{ github.event.inputs.start_date }} ${{ github.event.inputs.end_date }} --force --no-notify
        
    - name: Commit and push changes
      run: |
        git config --global user.email "791751568@qq.com"
        git config --global user.name "adminlove520"
        git add .
        git commit -m "docs: backfill history from ${{ github.event.inputs.start_date }} to ${{ github.event.inputs.end_date }}" || exit 0
        git push origin main
