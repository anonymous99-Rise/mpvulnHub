name: Backfill History

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Backfill Mode'
        required: true
        default: 'range'
        type: choice
        options:
        - range
        - date
      target_date:
        description: 'Target Date (YYYY-MM-DD) [For Date Mode]'
        required: false
        default: ''
      start_date:
        description: 'Start Date (YYYY-MM-DD) [For Range Mode]'
        required: false
        default: '2024-01-01'
      end_date:
        description: 'End Date (YYYY-MM-DD) [For Range Mode]'
        required: false
        default: '2024-01-09'

jobs:
  backfill:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set executable permissions
      run: |
        chmod +x bin/wechatmp2markdown-v1.1.11_linux_amd64
        
    - name: Run backfill
      env:
         FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
         DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        MODE="${{ github.event.inputs.mode }}"
        
        if [ "$MODE" == "date" ]; then
            TARGET="${{ github.event.inputs.target_date }}"
            if [ -z "$TARGET" ]; then
                echo "Error: Target Date is required for Date Mode."
                exit 1
            fi
            echo "Starting backfill for specific date: $TARGET"
            python run.py --date "$TARGET" --force --no-notify
            
        elif [ "$MODE" == "range" ]; then
            START="${{ github.event.inputs.start_date }}"
            END="${{ github.event.inputs.end_date }}"
            if [ -z "$START" ] || [ -z "$END" ]; then
                echo "Error: Start Date and End Date are required for Range Mode."
                exit 1
            fi
            echo "Starting backfill for range: $START to $END"
            python run.py --range "$START" "$END" --force --no-notify
        else
            echo "Unknown mode: $MODE"
            exit 1
        fi
        
    - name: Commit and push changes
      run: |
        git config --global user.email "791751568@qq.com"
        git config --global user.name "adminlove520"
        git add doc/
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: backfill history (${{ github.event.inputs.mode }})" && git push origin main)
